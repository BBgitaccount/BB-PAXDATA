[mypy]
python_version = 3.12
strict = True
ignore_missing_imports = False
warn_return_any = True
warn_unused_configs = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-vaderSentiment.*]
ignore_missing_imports = True

[mypy-aiofiles.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True
