[project]
name = "bb-paxdata"
version = "0.1.0"
description = "Data Science Based Diplomatic Analysis"
authors = [
    {name = "Barış Bozkurt", email = "barisbozkurthello@gmail.com"}
]
license = "GPL-3.0"
readme = "README.md"
