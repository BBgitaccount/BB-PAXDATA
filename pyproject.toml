[project]
name = "bb-paxdata"
version = "0.1.0"
description = "Data Science Based Diplomatic Analysis"
authors = [
    {name = "Barış Bozkurt", email = "barisbozkurthello@gmail.com"}
]
license = "GPL-3.0"
readme = "README.md"
requires-python = ">=3.10,<3.15"
dependencies = [
    "pydantic>=2.0,<3",
    "sqlalchemy>=2.0,<3",
    "alembic (>=1.13,<2)",
    "requests>=2.31.0",
    "vaderSentiment>=3.3.2",
    "numpy>=1.26.0",
    "scipy>=1.12.0",
    "scikit-learn>=1.4.0",
    "structlog>=23.0.0",
    "aiofiles>=23.0.0",
    "redis[asyncio]>=5.0.0",
    "httpx>=0.27.0",
    "aiosqlite>=0.20.0",
]



[tool.poetry]
# KRİTİK: Python paket ismi alt tire (_) içermelidir, tire (-) içeremez.
packages = [{include = "bb_paxdata", from = "src"}]

[tool.poetry.group.dev.dependencies]
ruff = "^0.4.0"
black = "^24.3.0"
mypy = "^1.9.0"
pytest = "^8.0.0"
pytest-cov = "^5.0.0"
pre-commit = "^4.0.0"
pydantic = ">=2.13.0,<3"
types-requests = "^2.32.0.20240914"
types-redis = "^4.6.0.20240425"
types-aiofiles = "^23.2.0.20240403"
pytest-asyncio = "^0.23.0"


[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
# Görüntüdeki 'top-level settings are deprecated' uyarısını bu katman çözer.
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E501", "W291"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = "src"
plugins = ["pydantic.mypy"]

[mypy-redis.*]
ignore_missing_imports = true

[mypy-aiofiles.*]
ignore_missing_imports = true
 
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"