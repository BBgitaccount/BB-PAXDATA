[project]
name = "bb-paxdata"
version = "0.1.0"
description = "Data Science Based Diplomatic Analysis"
authors = [
    {name = "Barış Bozkurt", email = "barisbozkurthello@gmail.com"}
]
license = "GPL-3.0"
readme = "README.md"
requires-python = ">=3.10,<3.15"
dependencies = []

[tool.poetry]
# src/ altındaki klasörün modül olarak tanınması için kritik
packages = [{include = "bb-paxdata", from = "src"}]

[tool.poetry.group.dev.dependencies]
ruff = "^0.4.0"
black = "^24.3.0"
mypy = "^1.9.0"
pytest = "^8.0.0"
pytest-cov = "^5.0.0"

[tool.ruff]
line-length = 88
target-version = "py312"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"