version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: bbpaxdata-prometheus
    volumes:
      - ./src/bb_paxdata/infrastructure/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    networks:
      - bbpaxdata-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: bbpaxdata-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=bbpaxdata2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/bbpaxdata.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./src/bb_paxdata/infrastructure/observability/dashboard/grafana.json:/var/lib/grafana/dashboards/bbpaxdata.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - bbpaxdata-net

volumes:
  prometheus_data:
  grafana_data:

networks:
  bbpaxdata-net:
    driver: bridge
